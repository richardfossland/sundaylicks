# CI — runs the local `npm run check` gate (tsc + vitest) plus the OpenNext
# Worker build, so PRs catch type/logic regressions and deploy-time bundling
# breaks. (No Cloudflare auth needed: build only, no deploy.)
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run cf:build
